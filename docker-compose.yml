version: '3.8'

services:
  shadowline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shadowline_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_DEFAULT_CHAIN=${NEXT_PUBLIC_DEFAULT_CHAIN:-sepolia}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:-public-demo-project-id}
      - NEXT_PUBLIC_ZAMA_RELAYER_API_KEY=${NEXT_PUBLIC_ZAMA_RELAYER_API_KEY:-}
    networks:
      - shadowline_net

networks:
  shadowline_net:
    driver: bridge
